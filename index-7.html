<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طعم زمان - قائمة الطعام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3155;
      --gold: #d4a82a;
      --gold-light: #f0c84a;
      --gold-pale: #fdf3d7;
      --gold-dim: rgba(212, 168, 42, 0.15);
      --white: #ffffff;
      --off-white: #f8f5ee;
      --text-light: #c8b97a;
      --shadow-gold: 0 0 30px rgba(212, 168, 42, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== NOISE OVERLAY ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 2rem;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,168,42,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(10,22,40,0.8) 0%, transparent 70%),
        linear-gradient(180deg, #0a1628 0%, #112240 50%, #0a1628 100%);
      z-index: 0;
    }

    /* Decorative gold circles */
    .hero-bg::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      border: 1px solid rgba(212,168,42,0.08);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-ring 4s ease-in-out infinite;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(212,168,42,0.12);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-ring 4s ease-in-out infinite 1s;
    }

    @keyframes pulse-ring {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
    }

    .hero-content { position: relative; z-index: 2; }

    .logo-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.2s;
    }

    .ornament-line {
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .ornament-diamond {
      width: 8px; height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .restaurant-name {
      font-family: 'Amiri', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-shadow: none;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.4s;
      filter: drop-shadow(0 0 40px rgba(212,168,42,0.3));
    }

    .restaurant-subtitle {
      font-size: 1rem;
      letter-spacing: 0.4em;
      color: var(--text-light);
      text-transform: uppercase;
      margin-top: 0.5rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.6s;
    }

    .scroll-hint {
      margin-top: 3rem;
      opacity: 0;
      animation: fadeDown 1s ease forwards 1.2s;
    }

    .scroll-hint span {
      display: block;
      color: var(--gold);
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .scroll-arrow {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 0 auto;
      position: relative;
      animation: scrollArrow 2s ease-in-out infinite;
    }

    @keyframes scrollArrow {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.6); opacity: 0.4; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== LOADING ===== */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 1.5rem;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #loading-screen.hidden { opacity: 0; visibility: hidden; }

    .loading-logo {
      font-family: 'Amiri', serif;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: var(--navy-light);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      animation: loadBar 1.5s ease-in-out infinite;
    }

    @keyframes loadBar {
      0% { width: 0%; margin-right: 100%; }
      50% { width: 100%; margin-right: 0%; }
      100% { width: 0%; margin-right: 0%; margin-left: 100%; }
    }

    /* ===== STICKY NAV ===== */
    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 22, 40, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212,168,42,0.2);
      padding: 0 1rem;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.8rem 0;
    }

    .nav-brand {
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .nav-tabs {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-tab {
      padding: 0.45rem 1rem;
      border: 1px solid transparent;
      border-radius: 50px;
      background: transparent;
      color: var(--text-light);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-tab:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }

    .nav-tab.active {
      background: linear-gradient(135deg, var(--gold), #b8860b);
      color: var(--navy);
      border-color: transparent;
      box-shadow: 0 0 20px rgba(212,168,42,0.4);
    }

    /* ===== MAIN CONTENT ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      position: relative;
      z-index: 1;
    }

    /* ===== SECTION HEADER ===== */
    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--gold-light);
      margin-bottom: 0.75rem;
    }

    .section-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .section-divider::after {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .section-divider-icon {
      color: var(--gold);
      font-size: 1.2rem;
    }

    /* ===== MENU SECTION ===== */
    .menu-section { display: none; }
    .menu-section.active { display: block; }

    /* ===== MENU GRID ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .menu-card {
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
      border: 1px solid rgba(212,168,42,0.15);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      animation: cardReveal 0.5s ease both;
    }

    .menu-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle at top right, rgba(212,168,42,0.08), transparent 70%);
    }

    .menu-card:hover {
      border-color: rgba(212,168,42,0.5);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), var(--shadow-gold);
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-number {
      position: absolute;
      top: 0.75rem;
      left: 1rem;
      font-size: 0.7rem;
      color: rgba(212,168,42,0.3);
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .card-info { flex: 1; }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }

    .card-category {
      font-size: 0.75rem;
      color: var(--text-light);
      opacity: 0.7;
    }

    .card-price {
      background: linear-gradient(135deg, var(--gold), #b8860b);
      color: var(--navy);
      font-weight: 900;
      font-size: 1.05rem;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(212,168,42,0.3);
    }

    /* ===== PIZZA MULTI-PRICE CARDS ===== */
    .pizza-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    .pizza-card {
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
      border: 1px solid rgba(212,168,42,0.15);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      animation: cardReveal 0.5s ease both;
    }

    .pizza-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 100px; height: 100px;
      background: radial-gradient(circle at top right, rgba(212,168,42,0.08), transparent 70%);
    }

    .pizza-card:hover {
      border-color: rgba(212,168,42,0.5);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), var(--shadow-gold);
    }

    .pizza-card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(212,168,42,0.15);
    }

    .pizza-card-number {
      font-size: 0.7rem;
      color: rgba(212,168,42,0.4);
      font-weight: 700;
    }

    .pizza-card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      flex: 1;
    }

    .pizza-prices {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pizza-price-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(212,168,42,0.08);
      border: 1px solid rgba(212,168,42,0.2);
      border-radius: 10px;
      padding: 0.4rem 0.75rem;
      flex: 1;
      min-width: 70px;
    }

    .pizza-size-label {
      font-size: 0.68rem;
      color: var(--text-light);
      margin-bottom: 0.2rem;
      white-space: nowrap;
    }

    .pizza-size-price {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--gold-light);
      white-space: nowrap;
    }

    /* ===== STATIC CONTACT CARDS ===== */
    .static-contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .static-contact-card {
      background: linear-gradient(145deg, var(--navy-mid), var(--navy-light));
      border: 1px solid rgba(212,168,42,0.25);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      text-align: center;
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      animation: cardReveal 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .static-contact-card::before {
      content: '';
      position: absolute;
      top: -30px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 60px;
      background: radial-gradient(ellipse, rgba(212,168,42,0.12), transparent 70%);
    }

    .static-contact-card:hover {
      border-color: var(--gold);
      transform: translateY(-5px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(212,168,42,0.15);
    }

    .sc-icon { font-size: 2.2rem; margin-bottom: 0.75rem; display: block; }

    .sc-branch {
      font-family: 'Amiri', serif;
      font-size: 1.5rem;
      color: var(--gold-light);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(212,168,42,0.2);
    }

    .sc-phones { display: flex; flex-direction: column; gap: 0.6rem; }

    .sc-phone-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--white);
      direction: ltr;
    }

    .sc-phone-row .ph-icon { color: var(--gold); font-size: 0.9rem; }

    .sc-phone-row a {
      color: inherit;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .sc-phone-row a:hover { color: var(--gold-light); }

    /* ===== CONTACT SECTION ===== */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .contact-card {
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
      border: 1px solid rgba(212,168,42,0.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      transition: all 0.3s ease;
      animation: cardReveal 0.5s ease both;
    }

    .contact-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), var(--shadow-gold);
    }

    .contact-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .contact-branch {
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--gold-light);
      margin-bottom: 0.75rem;
    }

    .contact-phone {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      direction: ltr;
      letter-spacing: 0.05em;
    }

    .contact-phone a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-phone a:hover { color: var(--gold); }

    /* ===== REFRESH INDICATOR ===== */
    .refresh-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,22,40,0.95);
      border: 1px solid rgba(212,168,42,0.3);
      border-radius: 50px;
      padding: 0.5rem 1.25rem;
      font-size: 0.78rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 200;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .refresh-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-light);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ===== ERROR BANNER ===== */
    .error-banner {
      background: rgba(180,30,30,0.15);
      border: 1px solid rgba(180,30,30,0.4);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      color: #ff9999;
      font-size: 0.9rem;
      text-align: center;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(212,168,42,0.1);
      color: rgba(200,185,122,0.4);
      font-size: 0.8rem;
      position: relative;
      z-index: 1;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
      .nav-inner { justify-content: center; }
      .nav-brand { display: none; }
    }
    /* ===== BRANCH SELECTOR MODAL ===== */
    #branch-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: rgba(5, 12, 25, 0.97);
      backdrop-filter: blur(12px);
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #branch-modal.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .branch-modal-box {
      background: linear-gradient(145deg, #0e1e3a, #162d54);
      border: 1px solid rgba(212,168,42,0.3);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 80px rgba(212,168,42,0.12), 0 40px 80px rgba(0,0,0,0.6);
      animation: modalIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position: relative;
      overflow: hidden;
    }

    .branch-modal-box::before {
      content: '';
      position: absolute;
      top: -40px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 80px;
      background: radial-gradient(ellipse, rgba(212,168,42,0.15), transparent 70%);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .branch-modal-logo {
      font-family: 'Amiri', serif;
      font-size: 2.2rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
      position: relative;
    }

    .branch-modal-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .branch-modal-ornament::before,
    .branch-modal-ornament::after {
      content: '';
      height: 1px;
      width: 50px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .branch-modal-ornament::after {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .branch-modal-ornament span { color: var(--gold); font-size: 0.8rem; }

    .branch-modal-title {
      font-size: 1rem;
      color: var(--text-light);
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }

    .branch-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(212,168,42,0.2);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      text-align: right;
      color: var(--white);
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      position: relative;
      overflow: hidden;
    }

    .branch-btn::after {
      content: '';
      position: absolute;
      inset: 0;

<script>
// ============================================================
//  CONFIG
// ============================================================
const SHEET_ID = '1SEeFYP_Q8BXyCQIVRgvZBG1qBU0DPQ8CjieN6rIOZwI';
const REFRESH_INTERVAL_MS = 60_000; // 1 minute

// Known sheets with fixed labels/icons
const KNOWN_SHEETS = [
  { name: 'سندوتش',            label: 'سندوتشات',        icon: '🥪', type: 'menu' },
  { name: 'شملولة',            label: 'شملولة',           icon: '🥙', type: 'menu' },
  { name: 'سندوتشات اللحوم',   label: 'سندوتشات اللحوم', icon: '🥩', type: 'menu' },
  { name: 'بيتزا',             label: 'بيتزا',            icon: '🍕', type: 'pizza' },
  { name: 'كشري',              label: 'كشري',             icon: '🍲', type: 'menu' },
  { name: 'قلبوظة',            label: 'قلبوظة',           icon: '🫙', type: 'menu' },
  { name: 'معلومات الاتصال',   label: 'تواصل معنا',       icon: '📞', type: 'contact-static' },
];

// Icon pool for auto-discovered sheets
const AUTO_ICONS = ['🍽','🥗','🍜','🥘','🧆','🫔','🍱','🥩','🍗','🧋'];

// Will be built after discovery
let SHEET_CONFIG = [];

// ============================================================
//  BRANCH CONFIG
// ============================================================
// Defines which sheet names are visible per branch
// 'all' = show everything discovered
const BRANCH_CONFIG = {
  maadi: {
    label: 'فرع المعدية',
    allowedSheets: ['سندوتش', 'معلومات الاتصال'],
  },
  koliya: {
    label: 'فرع الكلية',
    blockedSheets: ['بيتزا'],   // show all except these
  },
  ojina: {
    label: 'فرع أوجينا',
    allowedSheets: 'all',       // show everything
  },
};

let currentBranch = null;

function selectBranch(branchKey) {
  currentBranch = branchKey;
  const cfg = BRANCH_CONFIG[branchKey];

  // Hide modal with animation
  const modal = document.getElementById('branch-modal');
  modal.classList.add('hidden');

  // Filter SHEET_CONFIG based on branch rules
  applyBranchFilter();

  // Add branch badge to nav
  const existing = document.getElementById('branch-badge');
  if (existing) existing.remove();
  const badge = document.createElement('span');
  badge.id = 'branch-badge';
  badge.className = 'branch-badge';
  badge.title = 'تغيير الفرع';
  badge.textContent = cfg.label;
  badge.onclick = () => {
    modal.classList.remove('hidden');
  };
  document.querySelector('.nav-inner').prepend(badge);
}

function applyBranchFilter() {
  if (!currentBranch) return;
  const cfg = BRANCH_CONFIG[currentBranch];

  // Rebuild visible tabs & sections
  document.getElementById('nav-tabs').innerHTML = '';
  document.querySelectorAll('.menu-section').forEach(el => el.remove());

  // Filter the SHEET_CONFIG
  let filtered = SHEET_CONFIG;
  if (cfg.allowedSheets && cfg.allowedSheets !== 'all') {
    filtered = SHEET_CONFIG.filter(s => cfg.allowedSheets.includes(s.name.trim()));
  } else if (cfg.blockedSheets) {
    filtered = SHEET_CONFIG.filter(s => !cfg.blockedSheets.includes(s.name.trim()));
  }

  // Temporarily override SHEET_CONFIG for buildUI
  const saved = SHEET_CONFIG;
  SHEET_CONFIG = filtered;
  buildUI();
  SHEET_CONFIG = saved;

  loadAllData(false);
}


async function discoverSheets() {
  // Fetch the spreadsheet HTML page to extract sheet tab names
  try {
    const res = await fetch(
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/htmlview?_=${Date.now()}`
    );
    const html = await res.text();
    // Extract sheet names from tab elements
    const matches = [...html.matchAll(/id="sheet-button-[^"]*"[^>]*>([^<]+)</g)];
    let discovered = matches.map(m => m[1].trim()).filter(Boolean);

    if (discovered.length === 0) {
      // Fallback: use known sheets only
      SHEET_CONFIG = KNOWN_SHEETS;
      return;
    }

    // Build config: known first (in order), then any new ones appended
    const knownNames = KNOWN_SHEETS.map(s => s.name.trim());
    const result = [];
    let autoIconIdx = 0;

    // Add known sheets that exist in discovered
    for (const k of KNOWN_SHEETS) {
      const found = discovered.find(d => d.trim() === k.name.trim());
      if (found) result.push(k);
    }

    // Add newly discovered sheets not in known list
    for (const d of discovered) {
      const alreadyKnown = KNOWN_SHEETS.some(k => k.name.trim() === d.trim());
      if (!alreadyKnown) {
        result.push({
          name: d,
          label: d,
          icon: AUTO_ICONS[autoIconIdx++ % AUTO_ICONS.length],
          type: 'menu'
        });
      }
    }

    SHEET_CONFIG = result.length > 0 ? result : KNOWN_SHEETS;
  } catch (e) {
    console.warn('Sheet discovery failed, using known list:', e);
    SHEET_CONFIG = KNOWN_SHEETS;
  }
}


function csvUrl(sheetName) {
  const encoded = encodeURIComponent(sheetName);
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encoded}`;
}

async function fetchSheet(sheetName) {
  const res = await fetch(csvUrl(sheetName) + '&_=' + Date.now());
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const row = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    row.push(cur.trim());
    return row;
  });
}

// ============================================================
//  RENDER HELPERS
// ============================================================
function renderMenuItems(rows, sectionEl, icon) {
  // Find header row (contains "Item" or "اسم" or similar)
  const headerIdx = rows.findIndex(r => r[1] && (r[1].trim() === 'Item' || r[1].trim() === 'اسم الصنف'));
  const dataRows = rows.slice(headerIdx >= 0 ? headerIdx + 1 : 1);
  const items = dataRows.filter(r => r[0] && r[0].trim() && r[1] && r[1].trim());

  if (items.length === 0) {
    sectionEl.querySelector('.menu-grid').innerHTML =
      `<div class="empty-state"><div class="icon">🍽</div><p>لا توجد أصناف حالياً</p></div>`;
    return;
  }
  const grid = sectionEl.querySelector('.menu-grid');
  grid.innerHTML = items.map((r, idx) => {
    const no = r[0] || (idx + 1);
    const name = r[1] || '';
    const rawPrice = r[2] ? parseFloat(r[2]) : NaN;
    const price = !isNaN(rawPrice)
      ? rawPrice.toLocaleString('ar-EG', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' جنيه'
      : '—';
    return `
      <div class="menu-card" style="animation-delay:${idx * 0.06}s">
        <span class="card-number">#${no}</span>
        <div class="card-info">
          <div class="card-name">${name}</div>
        </div>
        <div class="card-price">${price}</div>
      </div>`;
  }).join('');
}

// Pizza: multi-price columns (No | Item | ميني | صغير | وسط | كبير | ساندوتش)
function renderPizza(rows, sectionEl) {
  // Detect header row
  const headerIdx = rows.findIndex(r =>
    r.some(c => c && (c.trim() === 'Item' || c.trim() === 'اسم الصنف' || c.trim() === 'وسط' || c.trim() === 'كبير'))
  );
  if (headerIdx < 0) {
    sectionEl.querySelector('.pizza-grid').innerHTML =
      `<div class="empty-state"><div class="icon">🍕</div><p>لا توجد أصناف حالياً</p></div>`;
    return;
  }

  const headers = rows[headerIdx]; // [No, Item, ميني, صغير, وسط, كبير, ساندوتش, ...]
  // Size columns = everything after index 1 (skip No=0, Item=1)
  const sizeLabels = headers.slice(2).filter(h => h && h.trim());

  const dataRows = rows.slice(headerIdx + 1).filter(r => r[0] && r[0].trim() && r[1] && r[1].trim());

  const grid = sectionEl.querySelector('.pizza-grid');
  if (dataRows.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🍕</div><p>لا توجد أصناف حالياً</p></div>`;
    return;
  }

  grid.innerHTML = dataRows.map((r, idx) => {
    const no = r[0] || (idx + 1);
    const name = r[1] || '';
    const prices = sizeLabels.map((label, i) => {
      const raw = r[2 + i] ? parseFloat(r[2 + i]) : NaN;
      const val = !isNaN(raw)
        ? raw.toLocaleString('ar-EG', { minimumFractionDigits: 0, maximumFractionDigits: 2 })
        : null;
      return val ? `
        <div class="pizza-price-badge">
          <span class="pizza-size-label">${label}</span>
          <span class="pizza-size-price">${val}</span>
        </div>` : '';
    }).join('');

    return `
      <div class="pizza-card" style="animation-delay:${idx * 0.06}s">
        <div class="pizza-card-header">
          <span class="pizza-card-number">#${no}</span>
          <span class="pizza-card-name">${name}</span>
        </div>
        <div class="pizza-prices">${prices}</div>
      </div>`;
  }).join('');
}

// Static contact data extracted from restaurant images
const STATIC_BRANCHES = [
  {
    name: 'فرع المعدية',
    icon: '📍',
    phones: ['0663418130']
  },
  {
    name: 'فرع الكلية – بورفؤاد',
    icon: '📍',
    phones: ['01211244730', '01211244750', '0663400402']
  },
  {
    name: 'فرع أوجينا وأبو الحسن',
    icon: '📍',
    phones: ['01205133363', '01559773252', '0663252999']
  }
];

function renderStaticContact(sectionEl) {
  const grid = sectionEl.querySelector('.static-contact-grid');
  grid.innerHTML = STATIC_BRANCHES.map((b, idx) => `
    <div class="static-contact-card" style="animation-delay:${idx * 0.15}s">
      <span class="sc-icon">${b.icon}</span>
      <div class="sc-branch">${b.name}</div>
      <div class="sc-phones">
        ${b.phones.map(p => `
          <div class="sc-phone-row">
            <span class="ph-icon">📞</span>
            <a href="tel:${p}">${p}</a>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function renderContact(rows, sectionEl) {
  const headerIdx = rows.findIndex(r => r.some(c => c && (c.includes('فرع') || c.includes('اسم') || c.includes('Branch'))));
  let branchCol = 0, phoneCol = 1;
  if (headerIdx >= 0) {
    const h = rows[headerIdx];
    h.forEach((c, i) => {
      if (c && (c.includes('فرع') || c.includes('اسم'))) branchCol = i;
      if (c && (c.includes('هاتف') || c.includes('تليفون') || c.includes('Phone') || c.includes('phone'))) phoneCol = i;
    });
  }

  const startRow = headerIdx >= 0 ? headerIdx + 1 : 1;
  const items = rows.slice(startRow).filter(r => r[branchCol] && r[branchCol].trim());

  const grid = sectionEl.querySelector('.contact-grid');
  if (items.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📞</div><p>لا توجد بيانات اتصال حالياً</p></div>`;
    return;
  }
  grid.innerHTML = items.map((r, idx) => {
    const branch = r[branchCol] || '';
    // Read phone as raw text — strip trailing .0 if Google Sheets stored it as float
    let phone = (r[phoneCol] || '').toString().replace(/\.0+$/, '').trim();
    // Restore leading zero if Egyptian mobile stored without it (10 digits → 11 digits)
    if (/^\d{10}$/.test(phone)) phone = '0' + phone;
    return `
      <div class="contact-card" style="animation-delay:${idx * 0.1}s">
        <span class="contact-icon">📍</span>
        <div class="contact-branch">${branch}</div>
        <div class="contact-phone"><a href="tel:${phone}">${phone}</a></div>
      </div>`;
  }).join('');
}

// ============================================================
//  BUILD TABS + SECTIONS
// ============================================================
function buildUI() {
  const navTabs = document.getElementById('nav-tabs');
  const main = document.getElementById('main-content');
  const errCon = document.getElementById('error-container');

  SHEET_CONFIG.forEach((cfg, idx) => {
    // Tab
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (idx === 0 ? ' active' : '');
    btn.dataset.section = cfg.name;
    btn.innerHTML = `${cfg.icon} ${cfg.label}`;
    btn.addEventListener('click', () => switchTab(cfg.name));
    navTabs.appendChild(btn);

    // Section
    const sec = document.createElement('div');
    sec.className = 'menu-section' + (idx === 0 ? ' active' : '');
    sec.id = 'section-' + cfg.name;

    if (cfg.type === 'pizza') {
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title">${cfg.icon} ${cfg.label}</div>
          <div class="section-divider"><span class="section-divider-icon">✦</span></div>
        </div>
        <div class="pizza-grid"><div class="empty-state"><div class="icon">⏳</div><p>جاري التحميل...</p></div></div>`;
    } else if (cfg.type === 'contact-static') {
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title">${cfg.icon} ${cfg.label}</div>
          <div class="section-divider"><span class="section-divider-icon">✦</span></div>
        </div>
        <div class="static-contact-grid"></div>`;
    } else if (cfg.type === 'menu') {
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title">${cfg.icon} ${cfg.label}</div>
          <div class="section-divider"><span class="section-divider-icon">✦</span></div>
        </div>
        <div class="menu-grid"><div class="empty-state"><div class="icon">⏳</div><p>جاري التحميل...</p></div></div>`;
    } else {
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title">${cfg.icon} ${cfg.label}</div>
          <div class="section-divider"><span class="section-divider-icon">✦</span></div>
        </div>
        <div class="contact-grid"><div class="empty-state"><div class="icon">⏳</div><p>جاري التحميل...</p></div></div>`;
    }

    main.insertBefore(sec, errCon.nextSibling);
    main.appendChild(sec);
  });
}

function switchTab(sheetName) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.section === sheetName));
  document.querySelectorAll('.menu-section').forEach(s => s.classList.toggle('active', s.id === 'section-' + sheetName));
  window.scrollTo({ top: document.getElementById('main-nav').offsetTop, behavior: 'smooth' });
}

// ============================================================
//  DATA LOADING
// ============================================================
async function loadAllData(showLoading = false) {
  const statusEl = document.getElementById('refresh-status');
  if (!showLoading) statusEl.textContent = 'جاري التحديث...';

  let hasError = false;

  // Only load sheets that have a visible section in the DOM
  const visibleSections = document.querySelectorAll('.menu-section');
  const visibleIds = [...visibleSections].map(s => s.id.replace('section-', ''));

  const sheetsToLoad = SHEET_CONFIG.filter(s => visibleIds.includes(s.name));

  for (const cfg of sheetsToLoad) {
    const sec = document.getElementById('section-' + cfg.name);
    if (!sec) continue;

    // Static contact section — render from hardcoded data, no fetch needed
    if (cfg.type === 'contact-static') {
      renderStaticContact(sec);
      continue;
    }

    try {
      const rows = await fetchSheet(cfg.name);
      if (cfg.type === 'pizza') renderPizza(rows, sec);
      else if (cfg.type === 'menu') renderMenuItems(rows, sec, cfg.icon);
      else renderContact(rows, sec);
    } catch (err) {
      console.warn(`Failed to load sheet "${cfg.name}":`, err);
      hasError = true;
      const grid = sec.querySelector('.menu-grid, .pizza-grid, .contact-grid');
      if (grid) grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>تعذر تحميل البيانات. تأكد أن الجدول عام.</p></div>`;
    }
  }

  const now = new Date();
  const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  statusEl.textContent = hasError
    ? `آخر محاولة: ${timeStr} (تحقق من صلاحية الجدول)`
    : `آخر تحديث: ${timeStr}`;
}

// ============================================================
//  INIT
// ============================================================
async function init() {
  // Step 1: discover sheets in background (don't wait for user yet)
  await discoverSheets();

  // Step 2: Hide loading screen — modal is already shown
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hidden');

  // Step 3: Modal is visible — user picks a branch via selectBranch()
  // selectBranch() → applyBranchFilter() → buildUI() + loadAllData()

  // Step 4: Auto-refresh every minute (respects current branch filter)
  setInterval(async () => {
    if (!currentBranch) return; // don't refresh if no branch picked yet
    const prevNames = SHEET_CONFIG.map(s => s.name).join(',');
    await discoverSheets();
    const newNames = SHEET_CONFIG.map(s => s.name).join(',');
    if (prevNames !== newNames) {
      applyBranchFilter(); // rebuilds tabs with new sheets
    } else {
      loadAllData(false);
    }
  }, REFRESH_INTERVAL_MS);
}

document.addEventListener('DOMContentLoaded', init);
</script>
