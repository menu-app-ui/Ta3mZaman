<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طعم زمان - لوبي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3155;
      --gold: #d4a82a;
      --gold-light: #f0c84a;
      --gold-pale: #fdf3d7;
      --gold-dim: rgba(212, 168, 42, 0.15);
      --white: #ffffff;
      --off-white: #f8f5ee;
      --text-light: #c8b97a;
      --shadow-gold: 0 0 30px rgba(212, 168, 42, 0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== NOISE OVERLAY ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 2rem;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,168,42,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(10,22,40,0.8) 0%, transparent 70%),
        linear-gradient(180deg, #0a1628 0%, #112240 50%, #0a1628 100%);
      z-index: 0;
    }

    /* Decorative gold circles */
    .hero-bg::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      border: 1px solid rgba(212,168,42,0.08);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-ring 4s ease-in-out infinite;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(212,168,42,0.12);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-ring 4s ease-in-out infinite 1s;
    }

    @keyframes pulse-ring {
      0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.03); }
    }

    .hero-content { position: relative; z-index: 2; }

    .logo-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.2s;
    }

    .ornament-line {
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .ornament-diamond {
      width: 8px; height: 8px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .restaurant-name {
      font-family: 'Amiri', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-shadow: none;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.4s;
      filter: drop-shadow(0 0 40px rgba(212,168,42,0.3));
    }

    .restaurant-subtitle {
      font-size: 1rem;
      letter-spacing: 0.4em;
      color: var(--text-light);
      text-transform: uppercase;
      margin-top: 0.5rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeDown 1s ease forwards 0.6s;
    }

    .scroll-hint {
      margin-top: 3rem;
      opacity: 0;
      animation: fadeDown 1s ease forwards 1.2s;
    }

    .scroll-hint span {
      display: block;
      color: var(--gold);
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .scroll-arrow {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      margin: 0 auto;
      position: relative;
      animation: scrollArrow 2s ease-in-out infinite;
    }

    @keyframes scrollArrow {
      0%, 100% { transform: scaleY(1); opacity: 1; }
      50% { transform: scaleY(0.6); opacity: 0.4; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== LOADING ===== */
    #loading-screen {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 1.5rem;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #loading-screen.hidden { opacity: 0; visibility: hidden; }

    .loading-logo {
      font-family: 'Amiri', serif;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: var(--navy-light);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
      animation: loadBar 1.5s ease-in-out infinite;
    }

    @keyframes loadBar {
      0% { width: 0%; margin-right: 100%; }
      50% { width: 100%; margin-right: 0%; }
      100% { width: 0%; margin-right: 0%; margin-left: 100%; }
    }

    /* ===== BRANCH SELECTION OVERLAY ===== */
    #branch-overlay {
      position: fixed; inset: 0;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      z-index: 9998;
      flex-direction: column;
      gap: 0;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    #branch-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .branch-overlay-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,168,42,0.1) 0%, transparent 60%),
        linear-gradient(180deg, #0a1628 0%, #112240 50%, #0a1628 100%);
    }

    .branch-overlay-content {
      position: relative; z-index: 2;
      text-align: center;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: fadeDown 0.8s ease forwards 0.2s;
      opacity: 0;
    }

    .branch-logo {
      font-family: 'Amiri', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(212,168,42,0.3));
      line-height: 1.1;
    }

    .branch-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      width: 100%;
    }

    .branch-ornament-line {
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .branch-ornament-diamond {
      width: 7px; height: 7px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .branch-prompt {
      font-size: 1.1rem;
      color: var(--text-light);
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .branch-cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
    }

    .branch-card {
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
      border: 1px solid rgba(212,168,42,0.2);
      border-radius: 20px;
      padding: 1.5rem 2rem;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 1.25rem;
      position: relative;
      overflow: hidden;
      text-align: right;
    }

    .branch-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 100px; height: 100px;
      background: radial-gradient(circle at top right, rgba(212,168,42,0.08), transparent 70%);
    }

    .branch-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(212,168,42,0.18);
    }

    .branch-card:active {
      transform: scale(0.98);
    }

    .branch-card-icon {
      font-size: 2.2rem;
      flex-shrink: 0;
      filter: drop-shadow(0 0 10px rgba(212,168,42,0.4));
    }

    .branch-card-info { flex: 1; }

    .branch-card-name {
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--gold-light);
      margin-bottom: 0.25rem;
    }

    .branch-card-desc {
      font-size: 0.8rem;
      color: var(--text-light);
      opacity: 0.8;
    }

    .branch-card-arrow {
      color: var(--gold);
      font-size: 1.2rem;
      opacity: 0.6;
      transition: opacity 0.3s, transform 0.3s;
      flex-shrink: 0;
    }

    .branch-card:hover .branch-card-arrow {
      opacity: 1;
      transform: translateX(-5px);
    }

    /* ===== STICKY NAV ===== */
    .sticky-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 22, 40, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212,168,42,0.2);
      padding: 0 1rem;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.8rem 0;
    }

    .nav-brand {
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .nav-tabs {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-tab {
      padding: 0.45rem 1rem;
      border: 1px solid transparent;
      border-radius: 50px;
      background: transparent;
      color: var(--text-light);
      font-family: 'Cairo', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-tab:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-dim);
    }

    .nav-tab.active {
      background: linear-gradient(135deg, var(--gold), #b8860b);
      color: var(--navy);
      border-color: transparent;
      box-shadow: 0 0 20px rgba(212,168,42,0.4);
    }

    /* ===== MAIN CONTENT ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      position: relative;
      z-index: 1;
    }

    /* ===== SECTION HEADER ===== */
    .section-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .section-title {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--gold-light);
      margin-bottom: 0.75rem;
    }

    .section-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .section-divider::after {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .section-divider-icon {
      color: var(--gold);
      font-size: 1.2rem;
    }

    /* ===== MENU SECTION ===== */
    .menu-section { display: none; }
    .menu-section.active { display: block; }

    /* ===== MENU GRID ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .menu-card {
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
      border: 1px solid rgba(212,168,42,0.15);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      animation: cardReveal 0.5s ease both;
    }

    .menu-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle at top right, rgba(212,168,42,0.08), transparent 70%);
    }

    .menu-card:hover {
      border-color: rgba(212,168,42,0.5);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), var(--shadow-gold);
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-number {
      position: absolute;
      top: 0.75rem;
      left: 1rem;
      font-size: 0.7rem;
      color: rgba(212,168,42,0.3);
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .card-info { flex: 1; }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }

    .card-category {
      font-size: 0.75rem;
      color: var(--text-light);
      opacity: 0.7;
    }

    .card-price {
      background: linear-gradient(135deg, var(--gold), #b8860b);
      color: var(--navy);
      font-weight: 900;
      font-size: 1.05rem;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(212,168,42,0.3);
    }

    /* ===== PIZZA MULTI-PRICE CARDS ===== */
    .pizza-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    .pizza-card {
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
      border: 1px solid rgba(212,168,42,0.15);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      animation: cardReveal 0.5s ease both;
    }

    .pizza-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 100px; height: 100px;
      background: radial-gradient(circle at top right, rgba(212,168,42,0.08), transparent 70%);
    }

    .pizza-card:hover {
      border-color: rgba(212,168,42,0.5);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), var(--shadow-gold);
    }

    .pizza-card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(212,168,42,0.15);
    }

    .pizza-card-number {
      font-size: 0.7rem;
      color: rgba(212,168,42,0.4);
      font-weight: 700;
    }

    .pizza-card-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      flex: 1;
    }

    .pizza-prices {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pizza-price-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(212,168,42,0.08);
      border: 1px solid rgba(212,168,42,0.2);
      border-radius: 10px;
      padding: 0.4rem 0.75rem;
      flex: 1;
      min-width: 70px;
    }

    .pizza-size-label {
      font-size: 0.68rem;
      color: var(--text-light);
      margin-bottom: 0.2rem;
      white-space: nowrap;
    }

    .pizza-size-price {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--gold-light);
      white-space: nowrap;
    }

    /* ===== STATIC CONTACT CARDS ===== */
    .static-contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .static-contact-card {
      background: linear-gradient(145deg, var(--navy-mid), var(--navy-light));
      border: 1px solid rgba(212,168,42,0.25);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      text-align: center;
      transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
      animation: cardReveal 0.5s ease both;
      position: relative;
      overflow: hidden;
    }

    .static-contact-card::before {
      content: '';
      position: absolute;
      top: -30px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 60px;
      background: radial-gradient(ellipse, rgba(212,168,42,0.12), transparent 70%);
    }

    .static-contact-card:hover {
      border-color: var(--gold);
      transform: translateY(-5px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(212,168,42,0.15);
    }

    .sc-icon { font-size: 2.2rem; margin-bottom: 0.75rem; display: block; }

    .sc-branch {
      font-family: 'Amiri', serif;
      font-size: 1.5rem;
      color: var(--gold-light);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid rgba(212,168,42,0.2);
    }

    .sc-phones { display: flex; flex-direction: column; gap: 0.6rem; }

    .sc-phone-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--white);
      direction: ltr;
    }

    .sc-phone-row .ph-icon { color: var(--gold); font-size: 0.9rem; }

    .sc-phone-row a {
      color: inherit;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }

    .sc-phone-row a:hover { color: var(--gold-light); }

    /* ===== CONTACT SECTION ===== */
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .contact-card {
      background: linear-gradient(135deg, var(--navy-mid), var(--navy-light));
      border: 1px solid rgba(212,168,42,0.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      transition: all 0.3s ease;
      animation: cardReveal 0.5s ease both;
    }

    .contact-card:hover {
      border-color: var(--gold);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), var(--shadow-gold);
    }

    .contact-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .contact-branch {
      font-family: 'Amiri', serif;
      font-size: 1.4rem;
      color: var(--gold-light);
      margin-bottom: 0.75rem;
    }

    .contact-phone {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      direction: ltr;
      letter-spacing: 0.05em;
    }

    .contact-phone a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-phone a:hover { color: var(--gold); }

    /* ===== REFRESH INDICATOR ===== */
    .refresh-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,22,40,0.95);
      border: 1px solid rgba(212,168,42,0.3);
      border-radius: 50px;
      padding: 0.5rem 1.25rem;
      font-size: 0.78rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 200;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .refresh-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-light);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

    /* ===== ERROR BANNER ===== */
    .error-banner {
      background: rgba(180,30,30,0.15);
      border: 1px solid rgba(180,30,30,0.4);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      color: #ff9999;
      font-size: 0.9rem;
      text-align: center;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(212,168,42,0.1);
      color: rgba(200,185,122,0.4);
      font-size: 0.8rem;
      position: relative;
      z-index: 1;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .menu-grid { grid-template-columns: 1fr; }
      .contact-grid { grid-template-columns: 1fr; }
      .nav-inner { justify-content: center; }
      .nav-brand { display: none; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo">طعم زمان</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div style="color: var(--text-light); font-size: 0.85rem; letter-spacing: 0.2em;">جاري تحميل القائمة...</div>
</div>

<!-- Branch Selection Overlay -->
<div id="branch-overlay">
  <div class="branch-overlay-bg"></div>
  <div class="branch-overlay-content">
    <div class="branch-logo">طعم زمان</div>
    <div class="branch-ornament">
      <div class="branch-ornament-line"></div>
      <div class="branch-ornament-diamond"></div>
      <div class="branch-ornament-line"></div>
    </div>
    <div class="branch-prompt">اختر الفرع للمتابعة</div>
    <div class="branch-cards">
      <div class="branch-card" onclick="selectBranch('kolliya')">
        <div class="branch-card-icon">🏫</div>
        <div class="branch-card-info">
          <div class="branch-card-name">فرع الكلية</div>
          <div class="branch-card-desc">بورفؤاد</div>
        </div>
        <div class="branch-card-arrow">◀</div>
      </div>
      <div class="branch-card" onclick="selectBranch('madya')">
        <div class="branch-card-icon">⛵</div>
        <div class="branch-card-info">
          <div class="branch-card-name">فرع المعدية</div>
          <div class="branch-card-desc">بورفؤاد</div>
        </div>
        <div class="branch-card-arrow">◀</div>
      </div>
    </div>
  </div>
</div>

<!-- Hero Section -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="logo-ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
    <h1 class="restaurant-name">طعم زمان</h1>
    <p class="restaurant-subtitle">" أكل زمان و خير و جمال زمان "</p>
    <div class="scroll-hint">
      <span>اكتشف القائمة</span>
      <div class="scroll-arrow"></div>
    </div>
  </div>
</section>

<!-- Sticky Navigation -->
<nav class="sticky-nav" id="main-nav">
  <div class="nav-inner">
    <div class="nav-brand">🍽 طعم زمان</div>
    <div class="nav-tabs" id="nav-tabs">
      <!-- Tabs generated dynamically -->
    </div>
  </div>
</nav>

<!-- Main Content -->
<main id="main-content">
  <div id="error-container"></div>
  <!-- Sections generated dynamically -->
</main>

<!-- Refresh Indicator -->
<div class="refresh-bar">
  <div class="refresh-dot"></div>
  <span id="refresh-status">يتحدث تلقائياً كل دقيقة</span>
</div>

<!-- Footer -->
<footer>
  <p>© 2025 مطعم طعم زمان &nbsp;·&nbsp; القائمة تتحدث تلقائياً من Google Sheets</p>
</footer>

<script>
// ============================================================
//  LOBBY CONFIG — أطباق · ساندوتشات ص · شملولة · تواصل معنا
// ============================================================
const SHEET_ID = '1SEeFYP_Q8BXyCQIVRgvZBG1qBU0DPQ8CjieN6rIOZwI';
const REFRESH_INTERVAL_MS = 60_000;

// Branch configs
const BRANCH_CONFIGS = {
  kolliya: [
    { name: 'سندوتشات ص',      label: 'ساندوتشات ص',   icon: '🥪', type: 'menu' },
    { name: 'شملولة',           label: 'شملولة',         icon: '🥙', type: 'menu' },
    { name: 'أطباق',            label: 'أطباق',          icon: '🍽', type: 'menu' },
    { name: 'معلومات الاتصال',  label: 'تواصل معنا',     icon: '📞', type: 'contact-static' },
  ],
  madya: [
    { name: 'سندوتشات ص',      label: 'ساندوتشات ص',   icon: '🥪', type: 'menu' },
    { name: 'أطباق',            label: 'أطباق',          icon: '🍽', type: 'menu' },
    { name: 'معلومات الاتصال',  label: 'تواصل معنا',     icon: '📞', type: 'contact-static' },
  ],
};

let SHEET_CONFIG = [];

function selectBranch(branchKey) {
  SHEET_CONFIG = BRANCH_CONFIGS[branchKey];

  // Hide branch overlay with animation
  const overlay = document.getElementById('branch-overlay');
  overlay.classList.add('hidden');

  // Trigger init after overlay fades
  setTimeout(() => {
    overlay.style.display = 'none';
    init();
  }, 650);
}

// ============================================================
//  FETCH + CSV
// ============================================================
function csvUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}&_=${Date.now()}`;
}

async function fetchSheet(sheetName) {
  const res = await fetch(csvUrl(sheetName));
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return parseCSV(await res.text());
}

function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const row = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    row.push(cur.trim());
    return row;
  });
}

// ============================================================
//  RENDER HELPERS
// ============================================================
function renderMenuItems(rows, sectionEl) {
  const headerIdx = rows.findIndex(r => r[1] && (r[1].trim() === 'Item' || r[1].trim() === 'اسم الصنف'));
  const dataRows = rows.slice(headerIdx >= 0 ? headerIdx + 1 : 1);
  const items = dataRows.filter(r => r[0] && r[0].trim() && r[1] && r[1].trim());

  const grid = sectionEl.querySelector('.menu-grid');
  if (items.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🍽</div><p>لا توجد أصناف حالياً</p></div>`;
    return;
  }
  grid.innerHTML = items.map((r, idx) => {
    const no = r[0] || (idx + 1);
    const name = r[1] || '';
    const rawPrice = r[2] ? parseFloat(r[2]) : NaN;
    const price = !isNaN(rawPrice)
      ? rawPrice.toLocaleString('ar-EG', { minimumFractionDigits: 0, maximumFractionDigits: 2 }) + ' جنيه'
      : '—';
    return `
      <div class="menu-card" style="animation-delay:${idx * 0.06}s">
        <span class="card-number">#${no}</span>
        <div class="card-info"><div class="card-name">${name}</div></div>
        <div class="card-price">${price}</div>
      </div>`;
  }).join('');
}

// Static contact data
const STATIC_BRANCHES = [
  { name: 'فرع المعدية',          icon: '📍', phones: ['0663418130'] },
  { name: 'فرع الكلية – بورفؤاد', icon: '📍', phones: ['01211244730', '01211244750', '0663400402'] },
  { name: 'فرع أوجينا وأبو الحسن',icon: '📍', phones: ['01205133363', '01559773252', '0663252999'] },
];

function renderStaticContact(sectionEl) {
  const grid = sectionEl.querySelector('.static-contact-grid');
  grid.innerHTML = STATIC_BRANCHES.map((b, idx) => `
    <div class="static-contact-card" style="animation-delay:${idx * 0.15}s">
      <span class="sc-icon">${b.icon}</span>
      <div class="sc-branch">${b.name}</div>
      <div class="sc-phones">
        ${b.phones.map(p => `
          <div class="sc-phone-row">
            <span class="ph-icon">📞</span>
            <a href="tel:${p}">${p}</a>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// ============================================================
//  BUILD UI
// ============================================================
function buildUI() {
  const navTabs = document.getElementById('nav-tabs');
  const main    = document.getElementById('main-content');
  const errCon  = document.getElementById('error-container');

  SHEET_CONFIG.forEach((cfg, idx) => {
    // Tab button
    const btn = document.createElement('button');
    btn.className = 'nav-tab' + (idx === 0 ? ' active' : '');
    btn.dataset.section = cfg.name;
    btn.innerHTML = `${cfg.icon} ${cfg.label}`;
    btn.addEventListener('click', () => switchTab(cfg.name));
    navTabs.appendChild(btn);

    // Section
    const sec = document.createElement('div');
    sec.className = 'menu-section' + (idx === 0 ? ' active' : '');
    sec.id = 'section-' + cfg.name;

    if (cfg.type === 'contact-static') {
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title">${cfg.icon} ${cfg.label}</div>
          <div class="section-divider"><span class="section-divider-icon">✦</span></div>
        </div>
        <div class="static-contact-grid"></div>`;
    } else {
      sec.innerHTML = `
        <div class="section-header">
          <div class="section-title">${cfg.icon} ${cfg.label}</div>
          <div class="section-divider"><span class="section-divider-icon">✦</span></div>
        </div>
        <div class="menu-grid"><div class="empty-state"><div class="icon">⏳</div><p>جاري التحميل...</p></div></div>`;
    }

    main.insertBefore(sec, errCon.nextSibling);
    main.appendChild(sec);
  });
}

function switchTab(sheetName) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.section === sheetName));
  document.querySelectorAll('.menu-section').forEach(s => s.classList.toggle('active', s.id === 'section-' + sheetName));
  window.scrollTo({ top: document.getElementById('main-nav').offsetTop, behavior: 'smooth' });
}

// ============================================================
//  DATA LOADING
// ============================================================
async function loadAllData() {
  const statusEl = document.getElementById('refresh-status');
  statusEl.textContent = 'جاري التحديث...';
  let hasError = false;

  for (const cfg of SHEET_CONFIG) {
    const sec = document.getElementById('section-' + cfg.name);
    if (!sec) continue;

    if (cfg.type === 'contact-static') {
      renderStaticContact(sec);
      continue;
    }

    try {
      const rows = await fetchSheet(cfg.name);
      renderMenuItems(rows, sec);
    } catch (err) {
      console.warn(`Failed to load "${cfg.name}":`, err);
      hasError = true;
      const grid = sec.querySelector('.menu-grid');
      if (grid) grid.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>تعذر تحميل البيانات. تأكد أن الجدول عام.</p></div>`;
    }
  }

  const now = new Date();
  const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
  statusEl.textContent = hasError
    ? `آخر محاولة: ${timeStr}`
    : `آخر تحديث: ${timeStr}`;
}

// ============================================================
//  INIT — called after branch selection
// ============================================================
async function init() {
  buildUI();
  await loadAllData();

  // Hide loading screen
  document.getElementById('loading-screen').classList.add('hidden');

  // Auto-refresh every minute
  setInterval(loadAllData, REFRESH_INTERVAL_MS);
}

// On load: just hide the loading screen after fonts settle, show branch overlay
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.getElementById('loading-screen').classList.add('hidden');
  }, 1500);
});
</script>
</body>
</html>
